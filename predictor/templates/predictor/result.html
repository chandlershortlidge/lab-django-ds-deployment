{% extends "predictor/base.html" %}

{% block title %}Prediction Result{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h2 class="card-title mb-3">Prediction Result</h2>
                <p class="fs-3 text-success fw-bold">Iris {{ prediction }}</p>
            </div>
        </div>

        <div class="card shadow-sm mt-3">
            <div class="card-body">
                <h5 class="card-title">Input Values</h5>
                <table class="table table-striped mb-0">
                    <thead>
                        <tr><th>Feature</th><th>Value</th></tr>
                    </thead>
                    <tbody>
                        {% for feature_info, value in features %}
                            <tr><td>{{ feature_info.1 }}</td><td>{{ value }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <a href="{% url 'home' %}" class="btn btn-outline-success mt-3">Make another prediction</a>
    </div>
</div>
{% endblock %}
